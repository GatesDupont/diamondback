# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
#
# Python is provisioned HERE, not from inside the R tests. The separation is
# deliberate:
#   * the log shows exactly what was installed, and at which versions;
#   * NumPy and SciPy are pinned and inspectable;
#   * a dependency-install failure is a distinct red step from a test failure;
#   * the tests have no hidden environmental side effects;
#   * nobody copies a test config that quietly authorises provisioning.
#
# The tests are then told which interpreter to use via RETICULATE_PYTHON, and
# assume the backend already exists. diamondback's own managed-environment path
# (diamondback_install_python) is exercised separately, in managed-python.yaml.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }}, Python ${{ matrix.config.python }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release', python: '3.12'}
          - {os: windows-latest, r: 'release', python: '3.12'}
          - {os: ubuntu-latest,  r: 'devel',   python: '3.12', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release', python: '3.12'}
          - {os: ubuntu-latest,  r: 'oldrel-1', python: '3.10'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      # ---- Python backend: provisioned explicitly, before any R runs ----
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.config.python }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy>=2.0" "scipy>=1.13"

      - name: Report the Python backend
        run: |
          python -c "import sys, numpy, scipy; print('python', sys.version)"
          python -c "import numpy, scipy; print('numpy', numpy.__version__, '| scipy', scipy.__version__)"
          python -c "import sys; print('interpreter:', sys.executable)"

      - name: Point reticulate at that interpreter
        shell: bash
        run: echo "RETICULATE_PYTHON=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"

      # ---- R ----
      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # Confirm that the interpreter installed above is the one R will actually
      # reach for. This deliberately does not mention diamondback: the package is
      # not installed yet at this point (setup-r-dependencies installs its
      # dependencies; check-r-package installs the package itself, later), and an
      # earlier version of this step called diamondback::diamondback_check()
      # here and failed on every platform with "there is no package called
      # 'diamondback'". reticulate is present, because diamondback Imports it.
      - name: Verify R can see the provisioned Python
        shell: Rscript {0}
        run: |
          py <- Sys.getenv("RETICULATE_PYTHON")
          if (!nzchar(py)) stop("RETICULATE_PYTHON is not set; the provisioning step did not take effect")
          if (!file.exists(py)) stop("RETICULATE_PYTHON points at a file that does not exist: ", py)
          reticulate::use_python(py, required = TRUE)
          cat("R will use:", reticulate::py_config()$python, "\n")
          np <- reticulate::import("numpy")
          sp <- reticulate::import("scipy")
          cat("numpy", np$`__version__`, "| scipy", sp$`__version__`, "\n")
        env:
          RETICULATE_PYTHON: ${{ env.RETICULATE_PYTHON }}

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
        env:
          RETICULATE_PYTHON: ${{ env.RETICULATE_PYTHON }}
          # The real guard against a hollow green tick. diamondback's tests skip
          # when no backend is available, which is right on a contributor's
          # laptop and wrong here: a run where every test skipped would pass. This
          # turns that skip into a failure, and it works because it is read inside
          # the test suite, where the package *is* installed.
          DIAMONDBACK_REQUIRE_BACKEND: "true"
